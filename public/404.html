<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <script>
      // GitHub Pages SPA redirect: serve index.html for any route under the base.
      sessionStorage.setItem('gh-pages-redirect', location.href);
      location.replace(location.pathname.split('/').slice(0, 2).join('/') + '/');
    </script>
  </head>
  <body></body>
</html>
